name: Build Windows Exe
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        pip install customtkinter matplotlib pyinstaller
        
    - name: Build Exe
      run: |
        cd LedgerPro
        pyinstaller --clean --onefile --noconsole --collect-all customtkinter --collect-all matplotlib main.py
        
    - name: Save Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LedgerPro-Windows
        path: LedgerPro/dist/main.exe
